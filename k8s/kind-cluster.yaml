# kind-cluster.yaml
# Định nghĩa cluster gồm 1 control-plane + 2 worker nodes
# Tương đương với: 1 "bộ não" điều phối + 2 "máy trạm" chạy task

apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: airflow-cluster
nodes:
  - role: control-plane      # Node điều khiển — chạy Scheduler, Webserver
  - role: worker             # Worker node 1 — chạy Task Pods
  - role: worker             # Worker node 2 — chạy Task Pods song song